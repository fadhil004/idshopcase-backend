name: Backend Deployment

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SERVER_IP }}" >> ~/.ssh/known_hosts

      - name: Sync backend source to server
        run: |
          rsync -az --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "node_modules" \
            --exclude "coverage" \
            --exclude ".env" \
            --exclude ".env.*" \
            --exclude "uploads" \
            --exclude "test.txt" \
            -e "ssh -i ~/.ssh/id_ed25519" \
            ./ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/opt/idshopcase/idshopcase-backend/

      - name: Build & Deploy via Docker
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/idshopcase

            # Rebuild and restart only the backend container
            docker compose build --no-cache backend
            docker compose run --rm backend npx sequelize-cli db:migrate
            docker compose up -d --no-deps backend

            # Reload nginx to pick up any upstream changes
            docker compose exec nginx nginx -s reload || true

            # Cleanup
            docker image prune -f

            echo "✅ Backend deployed successfully"
